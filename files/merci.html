<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merci — Rvolution X</title>
  <meta name="description" content="Votre demande d'audit a bien été reçue. Kevin vous contactera sous 24h.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://www.rvolutionx.be/merci.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .merci-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }
    .merci-card {
      max-width: 520px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 56px 48px;
      position: relative;
      overflow: hidden;
    }
    .merci-card::before {
      content: '';
      position: absolute;
      top: -60px; left: 50%; transform: translateX(-50%);
      width: 200px; height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(129,140,248,0.2), transparent 70%);
    }
    .merci-icon {
      font-size: 3rem;
      margin-bottom: 24px;
      display: block;
    }
    .merci-card h1 { font-size: 2rem; margin-bottom: 16px; }
    .merci-card p { margin-bottom: 12px; font-size: 1rem; }
    .merci-delay {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 100px;
      background: rgba(34,211,238,0.08);
      border: 1px solid rgba(34,211,238,0.2);
      color: var(--cyan);
      font-size: 0.82rem;
      margin: 20px 0 32px;
    }
  </style>
</head>
<body>
  <div class="orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">Rvolution<span>X</span></a>
    </div>
  </nav>

  <main class="merci-wrap">
    <div class="merci-card">
      <span class="merci-icon" aria-hidden="true">✦</span>
      <h1>Votre demande est bien reçue.</h1>
      <p>Merci pour votre confiance. Je reviens vers vous rapidement pour planifier notre échange.</p>
      <div class="merci-delay">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Réponse sous 24h ouvrées
      </div>
      <a href="/" class="btn btn-ghost">← Retour à l'accueil</a>
    </div>
  </main>

  <script src="/assets/js/main.js" defer></script>
</body>
</html>
