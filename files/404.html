<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable — Rvolution X</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
    body { display:flex; flex-direction:column; min-height:100vh; }
    .err-wrap {
      flex:1; display:flex; align-items:center; justify-content:center;
      padding:40px 24px; text-align:center;
    }
    .err-num {
      font-family:'Syne',sans-serif; font-size:clamp(6rem,20vw,12rem);
      font-weight:800; line-height:1;
      background: var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      margin-bottom:16px;
    }
    .err-wrap h1 { font-size:1.8rem; margin-bottom:12px; }
    .err-wrap p  { margin-bottom:36px; }
  </style>
</head>
<body>
  <div class="orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-3"></div>
  </div>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">Rvolution<span>X</span></a>
    </div>
  </nav>
  <main class="err-wrap">
    <div>
      <div class="err-num" aria-hidden="true">404</div>
      <h1>Cette page n'existe pas.</h1>
      <p>Le lien est peut-être cassé ou la page a été déplacée.</p>
      <div style="display:flex; gap:14px; justify-content:center; flex-wrap:wrap;">
        <a href="/" class="btn btn-primary">← Retour à l'accueil</a>
        <a href="/#audit" class="btn btn-ghost">Demander un audit</a>
      </div>
    </div>
  </main>
</body>
</html>
